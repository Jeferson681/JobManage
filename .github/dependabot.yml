
version: 2
updates:
  # Runtime dependencies (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "runtime"

  # Dev dependencies (dedicated file under dev-requirements/)
  - package-ecosystem: "pip"
    directory: "/dev-requirements"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dev"
