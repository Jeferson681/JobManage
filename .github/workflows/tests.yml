name: Tests

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    tests:
        name: Run tests
        runs-on: ubuntu-latest
        # rely on editable install to expose the `jobmanager` package
        # avoid exporting PYTHONPATH here to keep CI environment clean
        strategy:
            matrix:
                python-version: [3.11]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "${{ matrix.python-version }}"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt
            - name: Install package (editable)
              run: |
                  python -m pip install -e .
            - name: Run tests
              run: |
                  pytest -q

    integration_e2e:
        name: Run integration + E2E
        runs-on: ubuntu-latest
        needs: tests
        strategy:
            matrix:
                python-version: [3.11]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "${{ matrix.python-version }}"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt
            - name: Install package (editable)
              run: |
                  python -m pip install -e .
            - name: Run integration tests
              run: |
                  pytest tests/integration -q
            - name: Run e2e tests
              run: |
                  pytest tests/e2e -q
