name: Tests

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    tests:
        name: Run tests
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.11]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: 'pip'
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  # install project and dev extras
                  python -m pip install -e '.[dev]'
            - name: Run tests with coverage
              run: |
                  coverage run -m pytest -q
                  coverage report --fail-under=90
                  coverage xml -i
            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report-tests
                  path: coverage.xml

    integration_e2e:
        name: Run integration + E2E
        runs-on: ubuntu-latest
        needs: tests
        strategy:
            matrix:
                python-version: [3.11]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "${{ matrix.python-version }}"
                  cache: 'pip'
            - name: Install dependencies and package
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e '.[dev]'
            - name: Run integration tests with coverage
              run: |
                  coverage run -m pytest tests/integration -q
                  coverage xml -i -o coverage-integration.xml
            - name: Run e2e tests with coverage
              run: |
                  coverage run -m pytest tests/e2e -q
                  coverage xml -i -o coverage-e2e.xml
            - name: Upload integration and e2e coverage
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report-integration-e2e
                  path: |
                    coverage-integration.xml
                    coverage-e2e.xml
