name: Artifacts (demo assist_run)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  artifacts:
    name: Generate demo artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Generate artifacts (demo + metrics)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          ART_DIR=".tmp_ci_artifacts/${{ github.run_id }}"
          rm -rf "$ART_DIR"
          mkdir -p "$ART_DIR"
          python scripts/demo.py --db "$ART_DIR/demo.db" --iterations 12 > "$ART_DIR/demo_output.txt"
          python scripts/generate_artifacts.py --db "$ART_DIR/demo.db" --out "$ART_DIR"

      - name: Validate artifacts
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          out_dir = os.environ.get('ART_DIR', None) or f".tmp_ci_artifacts/{os.environ.get('GITHUB_RUN_ID','local')}"
          required = [
              "demo.db",
              "demo_output.txt",
              "metrics.txt",
              "health.txt",
          ]

            missing = [name for name in required if not os.path.exists(os.path.join(out_dir, name))]
            if missing:
              print("Missing required artifacts:", missing)
              sys.exit(1)

            with open(os.path.join(out_dir, "health.txt"), "r", encoding="utf-8") as f:
              health = json.load(f)
            if health.get("status") != "ok":
              print("health.txt is not ok:", health)
              sys.exit(1)

          with open(os.path.join(out_dir, "metrics.txt"), "r", encoding="utf-8") as f:
              metrics = json.load(f)

          jobs_by_status = metrics.get("jobs_by_status") or {}
          try:
              total_jobs = sum(int(v) for v in jobs_by_status.values())
          except Exception:
              print("Invalid jobs_by_status:", jobs_by_status)
              sys.exit(1)

          succeeded = int(jobs_by_status.get("SUCCEEDED", 0) or 0)
          canceled = int(jobs_by_status.get("CANCELED", 0) or 0)

          # Validation is intentionally tolerant to avoid flakes from retry jitter.
          if total_jobs < 3:
              print("Expected at least 3 jobs in metrics, got:", total_jobs)
              print("metrics:", metrics)
              sys.exit(1)
          if succeeded < 1:
              print("Expected at least 1 SUCCEEDED job, got:", succeeded)
              print("metrics:", metrics)
              sys.exit(1)
          if canceled < 1:
              print("Expected at least 1 CANCELED job, got:", canceled)
              print("metrics:", metrics)
              sys.exit(1)

          print("Artifacts OK")
          print("metrics:", metrics)
          PY

      - name: Upload assist_run directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assist_run-artifacts
          path: .tmp_ci_artifacts/${{ github.run_id }}
          retention-days: 7
