name: CI — secrets scan (warn-only)

on:
  push: {}
  pull_request: {}

jobs:
  secrets-scan-warn:
    name: Secrets scan (warn-only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install trufflehog via pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install trufflehog==3.0.1

      - name: Run trufflehog filesystem scan (warn-only)
        run: |
          if [ -x "./tools/trufflehog" ]; then
            ./tools/trufflehog filesystem --json . > trufflehog_report.json || true
          else
            trufflehog filesystem --json . > trufflehog_report.json || true
          fi

      - name: Filter trufflehog report (apply allowlist for local/private paths and `tools`)
        run: |
          python scripts/filter_trufflehog_report.py trufflehog_report.json filtered_trufflehog_report.json || true

      - name: Upload raw report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-raw
          path: trufflehog_report.json
          retention-days: 7

      - name: Upload filtered report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-filtered
          path: filtered_trufflehog_report.json
          retention-days: 7
