repos:
- repo: local
  hooks:
    - id: sqlite3-connect-check
      name: sqlite3 connect usage check
      entry: python scripts/check_sqlite_connect.py
      language: system
      pass_filenames: true
      files: '\.py$'
      description: "Detect sqlite3.connect usage outside allowlisted paths"

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
    - id: check-added-large-files

- repo: https://github.com/psf/black
  rev: 24.4.2
  hooks:
    - id: black
      args: [--line-length=120]

- repo: https://github.com/pycqa/isort
  rev: 8.0.0
  hooks:
    - id: isort

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.4.10
  hooks:
    - id: ruff
      args: [--fix]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.10.0
  hooks:
    - id: mypy
      files: ^src/

- repo: https://github.com/PyCQA/bandit
  rev: 1.7.9
  hooks:
    - id: bandit
      files: ^src/
      args: ["-q", "-r", "src"]
